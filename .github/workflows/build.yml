name: Build

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        mc: [1.20.1, 1.21.1, 1.21.4]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew build -PmcVersion=${{ matrix.mc }}
      - uses: actions/upload-artifact@v4
        with:
          name: dogecoin-mc${{ matrix.mc }}
          path: build/libs/dogecoin-*-mc${{ matrix.mc }}.jar
